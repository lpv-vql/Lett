<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Minimal SNS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.css">
  <style>
    body { font-family: sans-serif; background: #fff; color: #333; line-height: 1.6; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    input, textarea, button { border: 1px solid #ddd; border-radius: 2px; padding: 10px; font-size: 14px; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; }
    button { background: #333; color: #fff; cursor: pointer; border: none; font-weight: bold; }
    button.secondary { background: #eee; color: #333; width: auto; font-size: 12px; padding: 5px 10px; margin-top: 5px; }
    .btn-like { transition: all 0.2s; background: #fdfdfd; border: 1px solid #eee; }
    .btn-like:hover { background: #fff0f0; border-color: #ffbaba; }
    .btn-like.active { color: #e0245e; background: #fff0f0; border-color: #ffbaba; }
    .post-card { border-bottom: 1px solid #eee; padding: 15px 0; }
    .post-header { font-size: 12px; color: #777; margin-bottom: 5px; }
    .user-name { font-weight: bold; color: #333; }
    .post-id { background: #f4f4f4; padding: 2px 4px; }
    .reply-container { border-left: 2px solid #eee; margin-left: 10px; padding-left: 10px; display: none; }
    .omission-bar { font-size: 11px; color: #aaa; text-align: center; margin: 10px 0; border-top: 1px dashed #eee; }
    .omitted { margin-left: 0 !important; border-left: none; }
    .form-row { display: flex; gap: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="editor">
      <div class="form-row">
        <input type="text" id="displayName" placeholder="表示名">
        <input type="password" id="userId" placeholder="秘密コード">
      </div>
      <textarea id="content" rows="3" placeholder="今なにしてる？"></textarea>
      <button onclick="submitPost(this)">投稿する</button>
    </div>
    <div id="timeline">読み込み中...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxeUBFnu6yr0ckSIPzrrL66BwM5Y2CarMmxkqJz6Y9P_55diDNDAPvRM5q16oNAvYhP/exec";
    const md = window.markdownit();

    window.onload = () => {
      document.getElementById('displayName').value = localStorage.getItem('displayName') || '';
      document.getElementById('userId').value = localStorage.getItem('userId') || '';
      loadTimeline();
    };

    async function callGas(method, data) {
      const response = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ method, data })
      });
      return await response.json();
    }

    async function loadTimeline() {
      const userId = document.getElementById('userId').value;
      const posts = await callGas("fetchPosts", { parentId: "", userId: userId });
  
      const tl = document.getElementById('timeline');
      tl.innerHTML = '';
      posts.forEach(p => tl.appendChild(renderPost(p)));
    }

    function renderPost(p, isReply = false) {
      const div = document.createElement('div');
      div.className = 'post-card';
  
      const postIdStr = String(p.post_id);
      
      const activeClass = p.isLikedByMe ? "active" : "";

      const replyBtnHtml = p.replyCount > 0 
        ? `<button class="secondary" id="btn-${postIdStr}" onclick="toggleReplies('${postIdStr}')">返信を表示 (${p.replyCount})</button>`
        : "";

      div.innerHTML = `
        <div class="post-header">...</div>
        <div class="post-content">${md.render(safeContent)}</div>
        <div class="post-footer">
          ${replyBtnHtml} 
          <button class="secondary" onclick="showReplyForm('${postIdStr}', this)">返信</button>
          <button class="secondary btn-like ${activeClass}" id="like-${postIdStr}" onclick="handleLike('${postIdStr}', this)">
            ❤️ ${p.likeCount || 0}
          </button>
        </div>
        ...
      `;
      return div;
    }
    
    async function toggleReplies(postId) {
      const container = document.getElementById(`replies-${postId}`);
      const btn = document.getElementById(`btn-${postId}`);

      if (container.style.display === 'block') {
        container.style.display = 'none';
        btn.innerText = '返信を表示';
      } else {
        container.innerHTML = '読み込み中...';
        container.style.display = 'block';
        btn.innerText = '返信を非表示';
    
        const userId = document.getElementById('userId').value;
        const replies = await callGas("fetchPosts", { parentId: postId, userId: userId });
        
        container.innerHTML = '';
    
        // ここも念のため String() を挟む
        const rootId = String(postId).split('-')[0];

        replies.forEach(r => {
          const rIdStr = String(r.post_id);
          const depth = rIdStr.split('-').length;
          if (depth >= 5) {
            const bar = document.createElement('div');
            bar.className = 'omission-bar';
            bar.innerText = `-- 階層省略 (Root:#${rootId}) --`;
            container.appendChild(bar);
            const el = renderPost(r, true);
            el.classList.add('omitted');
            container.appendChild(el);
          } else {
            container.appendChild(renderPost(r, true));
          }
        });
      }
    }

    async function submitPost(btn) { // 引数 btn を追加
      if (!btn) btn = document.querySelector('button'); 

      const contentField = document.getElementById('content');
      const data = {
        displayName: document.getElementById('displayName').value,
        userId: document.getElementById('userId').value,
        content: contentField.value,
        parentId: "" 
      };

      if (!data.content.trim()) return;
  
      const originalText = btn.innerText;
      btn.disabled = true;
      btn.innerText = "送信中...";

      localStorage.setItem('displayName', data.displayName);
      localStorage.setItem('userId', data.userId);
  
      try {
        await callGas("addNewPost", data);
        contentField.value = '';
        await loadTimeline();
      } catch (e) {
        alert("送信に失敗しました");
      } finally {
        btn.disabled = false;
        btn.innerText = originalText;
      }
    }
    
    function showReplyForm(parentId, btn) {
      const container = document.getElementById(`reply-form-container-${parentId}`);
      
      // 既に入力欄がある場合は消す（トグル）
      if (container.innerHTML !== "") {
        container.innerHTML = "";
        return;
      }

      // 返信フォームのHTMLを生成
      container.innerHTML = `
        <div style="margin: 10px 0; padding: 10px; border: 1px solid #eee; background: #fafafa;">
          <textarea id="reply-content-${parentId}" rows="2" placeholder="#${parentId} への返信を書く" style="width:100%; margin-bottom:5px;"></textarea>
          <button class="secondary" style="width:100%; background:#333; color:#fff;" onclick="submitReply('${parentId}')">返信を送信</button>
        </div>
      `;
    }

    async function submitReply(parentId) {
      const contentField = document.getElementById(`reply-content-${parentId}`);
      const data = {
        displayName: document.getElementById('displayName').value,
        userId: document.getElementById('userId').value,
        content: contentField.value,
        parentId: parentId  // ここで親IDを指定！
      };

      if (!data.content.trim()) return alert("内容を入力してください");

      try {
        await callGas("addNewPost", data);
        document.getElementById(`reply-form-container-${parentId}`).innerHTML = ""; // フォームを閉じる
        // 返信一覧を再読み込み
        const container = document.getElementById(`replies-${parentId}`);
        container.style.display = 'none'; // 一旦閉じてから再表示
        toggleReplies(parentId); 
      } catch (e) {
        alert("送信に失敗しました");
      }
    }

    async function handleLike(postId, btn) {
      const userId = document.getElementById('userId').value;
      if (!userId) return alert("いいねするには秘密コードが必要です");

      btn.disabled = true;
      const res = await callGas("toggleLike", { postId, userId });
  
      if (res.success) {
        const currentCount = parseInt(btn.innerText.replace('❤️ ', ''));
        btn.innerText = `❤️ ${res.liked ? currentCount + 1 : currentCount - 1}`;
    
        // クラスを付け外しして色を変える
        if (res.liked) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      }
      btn.disabled = false;
    }   
  </script>
</body>
</html>

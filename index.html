<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SNS</title>
</head>
<body>

<h1>SNS</h1>

<input id="name" placeholder="名前"><br>
<input id="code" placeholder="コード"><br>
<textarea id="content" placeholder="本文"></textarea><br>
<button onclick="post()">投稿</button>

<h2>投稿一覧</h2>
<div id="posts"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxu2mQCBQYB8Tj8Jkjok5VImDDA8_TYt6771bZHbmHJ1tbzAas3AyGRuNnKb65bSXvh/exec";

let openedReplies = {}; // 開閉状態管理

async function load() {
  const res = await fetch(API + "?action=getPosts");
  const json = await res.json();

  const div = document.getElementById("posts");
  div.innerHTML = "";

  json.data.forEach(p => {
    const el = document.createElement("div");

    const id = p.id;
    const name = p.user_name;
    const uid = p.user_id.slice(0,8);
    const content = p.content;

    el.innerHTML = `
      <hr>
      <b>${name}</b> (${uid})<br>
      ${content}<br><br>

      <button onclick="showReplyForm('${id}', '${id}')">返信</button>
      <button onclick="toggleReplies('${id}')">返信を表示</button>

      <div id="replyForm-${id}"></div>
      <div id="replies-${id}"></div>
    `;

    div.appendChild(el);
  });
}

// ===== 返信フォーム =====
function showReplyForm(parent_id, root_id) {
  const div = document.getElementById("replyForm-" + parent_id);

  div.innerHTML = `
    <textarea id="replyContent-${parent_id}" placeholder="返信"></textarea><br>
    <button onclick="sendReply('${parent_id}', '${root_id}')">送信</button>
  `;
}

// ===== 返信送信 =====
async function sendReply(parent_id, root_id) {
  const name = document.getElementById("name").value;
  const code = document.getElementById("code").value;
  const content = document.getElementById("replyContent-" + parent_id).value;

  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "createReply",
      parent_id: parent_id,
      root_id: root_id,
      user_name: name,
      code: code,
      content: content
    })
  });

  const json = await res.json();

  if (json.status === "ok") {
    alert("返信成功");
    document.getElementById("replyForm-" + parent_id).innerHTML = "";
    load();
  } else {
    alert("エラー: " + json.message);
  }
}

// ===== 表示/非表示トグル =====
async function toggleReplies(root_id) {
  const div = document.getElementById("replies-" + root_id);

  if (openedReplies[root_id]) {
    div.innerHTML = "";
    openedReplies[root_id] = false;
    return;
  }

  openedReplies[root_id] = true;

  const res = await fetch(API + "?action=getReplies&root_id=" + root_id);
  const json = await res.json();

  renderReplies(div, json.data, root_id);
}

// ===== 返信描画（再帰対応） =====
function renderReplies(container, replies, root_id) {
  container.innerHTML = "";

  replies.forEach(r => {
    // 親投稿は除外（ここ重要）
    if (r.id === root_id) return;

    const el = document.createElement("div");

    const id = r.id;
    const parent = r.parent_id;
    const depth = r.depth;

    el.style.marginLeft = Math.min(depth, 2) * 20 + "px";

    el.innerHTML = `
      <div style="border-left:2px solid #ccc; padding-left:8px;">
        <b>${r.user_name}</b> (${r.user_id.slice(0,8)})<br>
        ${r.content}<br>

        <button onclick="showReplyForm('${id}', '${r.root_id}')">返信</button>
      </div>

      <div id="replyForm-${id}"></div>
    `;

    container.appendChild(el);
  });
}

// ===== 投稿 =====
async function post() {
  const name = document.getElementById("name").value;
  const code = document.getElementById("code").value;
  const content = document.getElementById("content").value;

  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "createPost",
      user_name: name,
      code: code,
      content: content
    })
  });

  const json = await res.json();

  if (json.status === "ok") {
    alert("投稿成功");
    load();
  } else {
    alert("エラー: " + json.message);
  }
}

load();
</script>

</body>
</html>

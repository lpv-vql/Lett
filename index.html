<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SNS</title>
</head>
<body>

<h1>SNS</h1>

<input id="name" placeholder="名前"><br>
<input id="code" placeholder="コード"><br>
<textarea id="content" placeholder="本文"></textarea><br>
<button onclick="post()">投稿</button>

<h2>投稿一覧</h2>
<div id="posts"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwQSI4wMAgiw5TRn_c0KXWSwCbLf424X5b1-GuBASDbhiuveM49k64R-pfEl4hB3bhH/exec";

let allReplies = []; 
let openedReplies = {}; // 開閉状態管理

async function load() {
  const res = await fetch(API + "?action=getAll");
  const json = await res.json();

  const posts = json.data.posts;
  const replies = json.data.replies;

  allReplies = replies; // ← ここに移動！！

  const div = document.getElementById("posts");
  div.innerHTML = "";

  posts.forEach(p => {
    const el = document.createElement("div");

    const id = String(p.id);
    const related = replies.filter(r =>String(r.parent_id) === String(id));

    el.innerHTML = `
      <hr>
      <b>${p.user_name}</b> (${p.user_id.slice(0,8)})<br>
      ${p.content}<br><br>

      <button onclick="showReplyForm('${id}', '${id}')">返信</button>

      <button id="toggleBtn-${id}" onclick="toggleReplies('${id}')">返信を表示 (${related.length})</button>

      <div id="replyForm-${id}"></div>
      <div id="replies-${id}"></div>
    `;

    div.appendChild(el);

    if (related.length === 1) {
      renderReplies(
        document.getElementById("replies-" + id),
        related,
        id
      );
    }
  });
}

// ===== 返信フォーム =====
function showReplyForm(parent_id, root_id) {
  const div = document.getElementById("replyForm-" + parent_id);

  div.innerHTML = `
    <textarea id="replyContent-${parent_id}" placeholder="返信"></textarea><br>
    <button onclick="sendReply('${parent_id}', '${root_id}')">送信</button>
  `;
}

// ===== 返信送信 =====
async function sendReply(parent_id, root_id) {
  const name = document.getElementById("name").value;
  const code = document.getElementById("code").value;
  const content = document.getElementById("replyContent-" + parent_id).value;

  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "createReply",
      parent_id: parent_id,
      root_id: root_id,
      user_name: name,
      code: code,
      content: content
    })
  });

  const json = await res.json();

  if (json.status === "ok") {
    alert("返信成功");
    document.getElementById("replyForm-" + parent_id).innerHTML = "";
    load();
  } else {
    alert("エラー: " + json.message);
  }
}

// ===== 表示/非表示トグル =====
function toggleReplies(root_id) {
  const div = document.getElementById("replies-" + root_id);
  const btn = document.getElementById("toggleBtn-" + root_id);

  const count = allReplies.filter(r =>
    String(r.parent_id) === String(root_id)
  ).length;

  if (openedReplies[root_id]) {
    div.innerHTML = "";
    openedReplies[root_id] = false;
    btn.innerText = `返信を表示 (${count})`;
    return;
  }

  openedReplies[root_id] = true;
  btn.innerText = `返信を非表示 (${count})`;

  const related = allReplies.filter(r =>
    String(r.parent_id) === String(root_id)
  );

  renderReplies(div, root_id, 1);
}

function getChildren(parent_id) {
  return allReplies.filter(r =>
    String(r.parent_id) === String(parent_id)
  );
}

function createReplyElement(r, depth) {
  const el = document.createElement("div");

  el.style.marginLeft = Math.min(depth, 2) * 20 + "px";

  el.innerHTML = `
    <div style="border-left:2px solid #ccc; padding-left:8px;">
      <b>${r.user_name}</b> (${r.user_id.slice(0,8)})<br>
      ${r.content}<br>

      <button onclick="showReplyForm('${r.id}', '${r.root_id}')">返信</button>
    </div>

    <div id="replyForm-${r.id}"></div>
  `;

  return el;
}
  
// ===== 返信描画（再帰対応） =====
function renderReplies(container, parent_id, depth = 1) {
  const children = getChildren(parent_id);

  // ===== 子が1個だけ → 直線表示 =====
  if (children.length === 1) {
    let current = children[0];

    while (current) {
      const el = createReplyElement(current, 0); // インデントなし
      container.appendChild(el);

      const next = getChildren(current.id);
      if (next.length !== 1) break;

      current = next[0];
    }

    // 分岐が出たら再帰
    if (current) {
      renderReplies(container, current.id, depth + 1);
    }

    return;
  }

  // ===== 分岐あり =====
  children.forEach(child => {
    const el = createReplyElement(child, depth);
    container.appendChild(el);

    const sub = document.createElement("div");
    container.appendChild(sub);

    const subChildren = getChildren(child.id);

    if (subChildren.length > 0) {
      // トグルボタン
      const btn = document.createElement("button");
      btn.innerText = `返信を表示 (${subChildren.length})`;

      btn.onclick = () => {
        if (sub.innerHTML) {
          sub.innerHTML = "";
          btn.innerText = `返信を表示 (${subChildren.length})`;
        } else {
          renderReplies(sub, child.id, depth + 1);
          btn.innerText = `返信を非表示 (${subChildren.length})`;
        }
      };

      container.appendChild(btn);
    }
  });
}
  
// ===== 投稿 =====
async function post() {
  const name = document.getElementById("name").value;
  const code = document.getElementById("code").value;
  const content = document.getElementById("content").value;

  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "createPost",
      user_name: name,
      code: code,
      content: content
    })
  });

  const json = await res.json();

  if (json.status === "ok") {
    alert("投稿成功");
    load();
  } else {
    alert("エラー: " + json.message);
  }
}

load();
</script>

</body>
</html>

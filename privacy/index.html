<main>
  <h1>Lett プライバシーポリシー</h1>
  <p>Lettのプライバシーポリシーです。本SNSを通じて収集する個人情報、その使用、処理、共有方法、そして安全に保つための取り組みについて説明するものです</p>
  <h2>取得する情報</h2>
  <ul>
    <li>表示名</li>
    <li>ハッシュ化されたパスワード</li>
    <li>投稿本文</li>
    <li>投稿日</li>
  </ul>
  <h2>免責事項</h2>
  <ul>
    <li>ユーザー同士のトラブルには関与しません。</li>
    <li>システム障害でデータが消えても保証しません。</li>
    <li>投稿内容の正確性や信頼性を保証しません。</li>
  </ul>
  <h2>削除・停止権</h2>
  <ul>
    <li>禁止事項に触れた場合、予告なく投稿を削除することができます。</li>
  </ul>
</main>
